<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>STEALTH 2FA · AUTO CLEAR</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ব্যাকগ্রাউন্ড আগের মতো গাঢ় */
        body {
            background: #0c0f1a;
            font-family: 'Poppins', system-ui, -apple-system, 'Segoe UI', sans-serif;
            display: flex;
            align-items: flex-start;    /* উপরে align (সেন্টার না) */
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 12px 20px 0 20px;  /* উপরের প্যাডিং 12px, নিচে 0 */
        }

        /* কন্টেইনার আগের মতো */
        .stealth-tool {
            width: 100%;
            max-width: 620px;
            margin-top: 6px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        /* ঘূর্ণায়মান গ্রেডিয়েন্ট বর্ডার দেওয়ার জন্য র‍্যাপার */
        .input-wrapper {
            position: relative;
            border-radius: 60px;
            background: linear-gradient(135deg, #0f1622, #070b12);
            padding: 2px;
            transition: all 0.2s;
        }

        /* অ্যানিমেটেড কনিক গ্রেডিয়েন্ট বর্ডার (রঙিন ঘুরবে) */
        .input-wrapper::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 60px;
            padding: 2px;
            background: conic-gradient(from 0deg, 
                #ffb347, #ff6b6b, #4ecdc4, #45b7d1, #96f0b6, #ffeaa7, #ffb347);
            background-size: 200% 200%;
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            animation: rotateBorder 3.5s linear infinite;
            pointer-events: none;
        }

        @keyframes rotateBorder {
            0% {
                background: conic-gradient(from 0deg, 
                    #ffb347, #ff6b6b, #4ecdc4, #45b7d1, #96f0b6, #ffeaa7, #ffb347);
            }
            100% {
                background: conic-gradient(from 360deg, 
                    #ffb347, #ff6b6b, #4ecdc4, #45b7d1, #96f0b6, #ffeaa7, #ffb347);
            }
        }

        /* ইনপুট ফিল্ড — বড়, গোল, গাঢ় */
        #twofa {
            width: 100%;
            background-color: #0b101a;
            border: none;
            border-radius: 56px;
            padding: 18px 26px;
            font-family: 'Poppins', monospace;
            font-size: 1.35rem;
            font-weight: 500;
            color: #f0f7ff;
            letter-spacing: 2px;
            text-align: center;
            outline: none;
            transition: all 0.25s ease;
            box-shadow: 0 8px 22px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255,255,255,0.05);
            backdrop-filter: blur(2px);
            caret-color: #ffcd7e;
        }

        #twofa:focus {
            background-color: #111a28;
            box-shadow: 0 0 0 3px rgba(80, 180, 250, 0.2), 0 8px 20px black;
        }

        /* প্লেসহোল্ডার আপনার দেওয়া লেখা অনুযায়ী */
        #twofa::placeholder {
            color: #b8d4ff;
            font-weight: 500;
            letter-spacing: 3px;
            opacity: 0.9;
            font-size: 1rem;
            text-shadow: 0 0 4px #2f6f8f;
            font-family: 'Poppins', monospace;
        }

        /* সব বাটন, এক্সট্রা এলিমেন্ট লুকানো */
        .action-row, .paste-btn, .extra, .note, .blink-dot, .header, .footer, .datetime, .logo-text, 
        .scroll-text, .timer-bar, .code-display, .main-box, .clear-mini, .auto-clear-tag, .status-msg, .info-text {
            display: none !important;
        }

        /* মোবাইলের জন্য রেস্পন্সিভ */
        @media (max-width: 550px) {
            #twofa {
                padding: 14px 22px;
                font-size: 1.2rem;
                letter-spacing: 1.5px;
            }
            .input-wrapper::before {
                border-radius: 56px;
            }
            body {
                padding: 10px 16px 0 16px;
            }
        }

        /* অন্য সব কিছু লুকান */
        .stealth-tool > :not(.input-wrapper) {
            display: none;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>
<body>

<div class="stealth-tool">
    <div class="input-wrapper">
        <!-- প্লেসহোল্ডার: আপনার পছন্দের লেখা -->
        <input type="text" id="twofa" placeholder="⚡ 𝗣𝗔𝗦𝗧 𝟮𝗙𝗔 ☆ 𝗔𝗨𝗧𝗢 𝗖𝗢𝗣𝗬 ⚡">
    </div>
</div>

<script>
    (function() {
        "use strict";

        // ---------- TOTP core: Base32 decode + HMAC-SHA1 ----------
        function base32Decode(base32) {
            const alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ234567';
            let clean = base32.replace(/\s+/g, '').replace(/=+$/, '').toUpperCase();
            let bits = 0, value = 0, output = [];
            for (let i = 0; i < clean.length; i++) {
                const idx = alphabet.indexOf(clean[i]);
                if (idx === -1) throw new Error('Invalid Base32 character');
                value = (value << 5) | idx;
                bits += 5;
                if (bits >= 8) {
                    output.push((value >>> (bits - 8)) & 0xFF);
                    bits -= 8;
                }
            }
            return new Uint8Array(output);
        }

        function generateTOTP(secret) {
            try {
                const keyBytes = base32Decode(secret);
                const keyWA = CryptoJS.lib.WordArray.create(keyBytes);
                const timeStep = 30;
                const counter = Math.floor(Date.now() / 1000 / timeStep);
                const counterBuffer = new ArrayBuffer(8);
                const counterView = new DataView(counterBuffer);
                counterView.setUint32(4, counter);
                const counterWA = CryptoJS.lib.WordArray.create(new Uint8Array(counterBuffer));
                const hmac = CryptoJS.HmacSHA1(counterWA, keyWA);
                const hexHash = hmac.toString(CryptoJS.enc.Hex);
                const offset = parseInt(hexHash.substr(39, 1), 16) * 2;
                const otpHex = hexHash.substr(offset, 8);
                let otp = parseInt(otpHex, 16) & 0x7FFFFFFF;
                otp = otp % 1000000;
                return otp.toString().padStart(6, '0');
            } catch (err) {
                console.warn("TOTP error:", err);
                throw new Error("Invalid secret key");
            }
        }

        // DOM elements
        const inputField = document.getElementById('twofa');
        
        // State variables
        let currentValidSecret = '';
        let totpInterval = null;
        let clearTimeoutId = null;

        function stopTotpTimer() {
            if (totpInterval) {
                clearInterval(totpInterval);
                totpInterval = null;
            }
        }

        // 2 সেকেন্ড পর ইনপুট ক্লিয়ার করার শিডিউল
        function scheduleAutoClear() {
            if (clearTimeoutId) {
                clearTimeout(clearTimeoutId);
                clearTimeoutId = null;
            }
            clearTimeoutId = setTimeout(() => {
                if (inputField) {
                    inputField.value = '';
                }
                if (currentValidSecret) {
                    currentValidSecret = '';
                    stopTotpTimer();
                }
                // প্লেসহোল্ডার আবার ডিফল্ট সেট
                if (inputField && inputField.placeholder !== "⚡ 𝗣𝗔𝗦𝗧 𝟮𝗙𝗔 ☆ 𝗔𝗨𝗧𝗢 𝗖𝗢𝗣𝗬 ⚡") {
                    inputField.placeholder = "⚡ 𝗣𝗔𝗦𝗧 𝟮𝗙𝗔 ☆ 𝗔𝗨𝗧𝗢 𝗖𝗢𝗣𝗬 ⚡";
                }
                clearTimeoutId = null;
            }, 2000);
        }

        function cancelPendingClear() {
            if (clearTimeoutId) {
                clearTimeout(clearTimeoutId);
                clearTimeoutId = null;
            }
        }

        // TOTP জেনারেট + ক্লিপবোর্ডে কপি
        function generateAndCopyCode() {
            if (!currentValidSecret || currentValidSecret.length < 16) return false;
            try {
                const code = generateTOTP(currentValidSecret);
                navigator.clipboard.writeText(code).catch(() => {
                    const tempArea = document.createElement('textarea');
                    tempArea.style.position = 'fixed';
                    tempArea.style.top = '-999px';
                    tempArea.style.left = '-999px';
                    tempArea.value = code;
                    document.body.appendChild(tempArea);
                    tempArea.select();
                    document.execCommand('copy');
                    document.body.removeChild(tempArea);
                });
                
                // প্লেসহোল্ডারে সাময়িক নোটিফিকেশন
                const originalPlaceholder = "⚡ 𝗣𝗔𝗦𝗧 𝟮𝗙𝗔 ☆ 𝗔𝗨𝗧𝗢 𝗖𝗢𝗣𝗬 ⚡";
                if (inputField.placeholder !== originalPlaceholder && !inputField.placeholder.includes("copied")) {
                    inputField.placeholder = `✔️ ${code} copied`;
                    setTimeout(() => {
                        if (inputField.placeholder.includes("copied") && !currentValidSecret) {
                            inputField.placeholder = originalPlaceholder;
                        } else if (inputField.placeholder.includes("copied") && currentValidSecret) {
                            if (!clearTimeoutId) {
                                inputField.placeholder = originalPlaceholder;
                            } else {
                                setTimeout(() => {
                                    if(inputField.placeholder.includes("copied")) inputField.placeholder = originalPlaceholder;
                                }, 1000);
                            }
                        } else {
                            inputField.placeholder = originalPlaceholder;
                        }
                    }, 1200);
                }
                return true;
            } catch (err) {
                if (currentValidSecret) {
                    currentValidSecret = '';
                    stopTotpTimer();
                    inputField.value = '';
                    cancelPendingClear();
                    inputField.placeholder = "❌ invalid key";
                    setTimeout(() => {
                        if (inputField.placeholder === "❌ invalid key") {
                            inputField.placeholder = "⚡ 𝗣𝗔𝗦𝗧 𝟮𝗙𝗔 ☆ 𝗔𝗨𝗧𝗢 𝗖𝗢𝗣𝗬 ⚡";
                        }
                    }, 1800);
                }
                return false;
            }
        }

        function startTotpUpdates() {
            stopTotpTimer();
            if (!currentValidSecret || currentValidSecret.length < 16) return;
            generateAndCopyCode();
            totpInterval = setInterval(() => {
                if (currentValidSecret && currentValidSecret.length >= 16) {
                    generateAndCopyCode();
                } else {
                    stopTotpTimer();
                }
            }, 1000);
        }

        // মূল প্রসেসিং: ইনপুট value থেকে সিক্রেট বের করে
        function processInputValue(rawValue) {
            const trimmedSecret = rawValue.trim();
            
            if (trimmedSecret === "") {
                if (currentValidSecret) {
                    currentValidSecret = '';
                    stopTotpTimer();
                }
                cancelPendingClear();
                return;
            }
            
            cancelPendingClear();
            
            if (trimmedSecret.length >= 16) {
                try {
                    const testCode = generateTOTP(trimmedSecret);
                    if (testCode && testCode.length === 6) {
                        if (currentValidSecret !== trimmedSecret) {
                            currentValidSecret = trimmedSecret;
                            startTotpUpdates();
                        } else {
                            if (!totpInterval) startTotpUpdates();
                        }
                        scheduleAutoClear();
                        return;
                    } else {
                        throw new Error("Invalid");
                    }
                } catch (err) {
                    if (currentValidSecret) {
                        currentValidSecret = '';
                        stopTotpTimer();
                    }
                    inputField.placeholder = "⚠️ invalid 2FA secret";
                    setTimeout(() => {
                        if (inputField.placeholder === "⚠️ invalid 2FA secret") {
                            inputField.placeholder = "⚡ 𝗣𝗔𝗦𝗧 𝟮𝗙𝗔 ☆ 𝗔𝗨𝗧𝗢 𝗖𝗢𝗣𝗬 ⚡";
                        }
                    }, 2000);
                    scheduleAutoClear();
                    return;
                }
            } 
            else {
                // দৈর্ঘ্য ১-১৫: অসম্পূর্ণ
                if (currentValidSecret) {
                    currentValidSecret = '';
                    stopTotpTimer();
                }
                if (trimmedSecret.length > 0) {
                    scheduleAutoClear();
                }
                if (trimmedSecret.length > 0 && trimmedSecret.length < 16) {
                    inputField.placeholder = "🔑 need 16+ chars";
                    setTimeout(() => {
                        if (inputField.placeholder === "🔑 need 16+ chars" && (!currentValidSecret)) {
                            inputField.placeholder = "⚡ 𝗣𝗔𝗦𝗧 𝟮𝗙𝗔 ☆ 𝗔𝗨𝗧𝗢 𝗖𝗢𝗣𝗬 ⚡";
                        }
                    }, 1500);
                }
                return;
            }
        }

        // ইভেন্ট লিসেনার
        function onInputChangeHandler() {
            processInputValue(inputField.value);
        }
        function onPasteHandler() {
            setTimeout(() => {
                onInputChangeHandler();
            }, 10);
        }

        inputField.addEventListener('input', onInputChangeHandler);
        inputField.addEventListener('paste', onPasteHandler);
        inputField.addEventListener('change', onInputChangeHandler);
        
        // পেজ লোড হলে যদি কিছু প্রি-ফিল্ড থাকে
        window.addEventListener('DOMContentLoaded', () => {
            const initialVal = inputField.value.trim();
            if (initialVal.length >= 16) {
                processInputValue(initialVal);
            } else if (initialVal.length > 0 && initialVal.length < 16) {
                if (initialVal !== "") scheduleAutoClear();
            }
        });
        
        window.addEventListener('beforeunload', () => {
            if (totpInterval) clearInterval(totpInterval);
            if (clearTimeoutId) clearTimeout(clearTimeoutId);
        });
        
        console.log("✅ Top-aligned 2FA | Rotating border | Auto-clear 2s | TOTP auto-copy | No buttons");
    })();
</script>
</body>
</html>
