<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EARNING BY HABIB · stealth</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* ---------- TOTAL MINIMAL: ONLY INPUT AT VERY TOP, NO EXTRA SPACE ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0c0f1a;
            font-family: 'Poppins', sans-serif;
            display: flex;
            flex-direction: column;      /* stack at top */
            align-items: center;
            justify-content: flex-start; /* PUSH TO VERY TOP */
            min-height: 100vh;
            margin: 0;
            padding: 0;
            opacity: 1;
        }

        /* ---------- EVERYTHING HIDDEN EXCEPT LOGO-BOX (which now holds input) ---------- */
        .header, .main-box, .footer, .datetime, .btn, .code-display, .timer-bar,
        .scroll-text, h2, button:not(#miniClearBtn), .footer div, .logo-text,
        br, hr, [class*="Appear"], [class*="pulse"], .btn.red, .btn, .main-box * {
            display: none !important;
        }

        /* ---------- THE ONLY VISIBLE CONTAINER: LOGO-BOX REPURPOSED ---------- */
        .logo-box {
            display: flex !important;
            visibility: visible !important;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 480px;
            margin: 0 auto;            /* center horizontally */
            padding: 0;
            background: transparent !important;
            box-shadow: none !important;
            border: none !important;
            transform: none !important;
            animation: none !important;
            position: relative;
            top: 0;                   /* absolute top placement */
            left: 0;
            right: 0;
        }

        /* input field — sits EXACTLY where logo used to be (top-most) */
        #twofa {
            display: block !important;
            visibility: visible !important;
            width: 100%;
            padding: 18px 22px;
            font-family: 'Poppins', sans-serif;
            font-size: 1.3rem;
            font-weight: 500;
            background-color: #111;
            border: 2px solid #2a4a5a;
            border-radius: 50px;
            color: #f0f9ff;
            letter-spacing: 2px;
            text-align: center;
            outline: none;
            transition: 0.2s;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
            caret-color: #8ad4ff;
            line-height: 1.4;
            margin-top: 0;             /* zero margin from top */
            -webkit-appearance: none;
            appearance: none;
        }

        #twofa:focus {
            border-color: #5db0e0;
            background-color: #161c24;
            box-shadow: 0 0 0 3px rgba(70, 170, 255, 0.2);
        }

        /* placeholder style — soft cyan, logo-mood */
        #twofa::placeholder {
            color: #b4ecff;
            font-weight: 500;
            opacity: 1;
            text-shadow: 0 0 5px rgba(0,220,255,0.3);
            font-size: 1.1rem;
            letter-spacing: 3px;
        }

        /* micro clear button — stays near input, no distraction */
        .clear-mini {
            display: inline-block !important;
            visibility: visible !important;
            margin-top: 10px;
            margin-bottom: 0;
            padding: 6px 18px;
            font-size: 0.75rem;
            font-weight: 400;
            color: #a0c0d0;
            background: rgba(20, 35, 45, 0.7);
            border: 1px solid #3e5a68;
            border-radius: 40px;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            backdrop-filter: blur(4px);
            cursor: pointer;
            transition: 0.2s;
            font-family: 'Poppins', sans-serif;
            border: 1px dashed #5f8a9a;
            width: fit-content;
            align-self: flex-end;
            margin-right: 8px;
        }

        .clear-mini:hover {
            background: #2a404c;
            color: white;
            border-color: #92c9d9;
        }

        /* force header to be at the very top edge */
        .header {
            display: flex !important;
            visibility: visible !important;
            justify-content: center;
            align-items: center;
            width: 100%;
            background: transparent;
            padding: 0;
            margin: 0;
            position: relative;
            top: 0;
            left: 0;
            right: 0;
            flex-shrink: 0;
        }

        /* remove any leftover onclick / anchor behavior */
        .logo-box[onclick] {
            pointer-events: none;
        }

        /* body top padding zero — stick to top */
        body {
            padding-top: 8px;         /* tiny breathing, but still at top */
        }

        /* no extra space anywhere */
        .logo-box {
            margin-top: 0;
            padding-top: 0;
        }

        /* ensure no residual footer-like spacing */
        body > *:not(.header) {
            display: none !important;
        }

        /* complete top alignment */
        .header {
            order: -1;
            margin-top: 0;
            padding-top: 0;
        }

        /* the input is literally the first element, touching top */
        #twofa {
            margin-top: 0;
        }

        /* if any hidden ghost, kill it */
        .datetime, .logo-text, .scroll-text, .footer, .main-box, h2, 
        .btn, .code-display, .timer-bar {
            display: none !important;
        }

    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>
<body>

<!-- ===== HEADER WITH LOGO-BOX – STRICTLY AT THE VERY TOP ===== -->
<div class="header">
    <div class="logo-box">   <!-- এই বক্সটাই এখন পুরোনো লোগোর জায়গা, একেবারে উপরে -->
        <!-- ইনপুট বক্স – লোগোর জায়গায় বসে আছে, উপরে -->
        <input id="twofa" type="text" placeholder="🇪 🇧 🇭  𝐏𝐀𝐒𝐓𝐄 𝟐𝐅𝐀  →  𝐀𝐔𝐓𝐎 𝐂𝐎𝐏𝐘">
        <!-- ক্লিয়ার বাটন: ছোট, অনুরোধে রাখা, ডানে চলে গেছে -->
        <button class="clear-mini" id="miniClearBtn">🗑  clear</button>
    </div>
</div>

<!-- আর কিছুই না — বাকি সব কাভার করে লুকানো, শুধু উপরের ইনপুট + ক্লিয়ার -->

<script>
    (function() {
        "use strict";

        // ---------- TOTP core (same robust engine) ----------
        function base32Decode(base32) {
            const alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ234567';
            base32 = base32.replace(/\s+/g, '').replace(/=+$/, '').toUpperCase();
            let bits = 0, value = 0, output = [];
            for (let i = 0; i < base32.length; i++) {
                const char = base32[i];
                const index = alphabet.indexOf(char);
                if (index === -1) throw new Error('Invalid Base32');
                value = (value << 5) | index;
                bits += 5;
                if (bits >= 8) {
                    output.push((value >>> (bits - 8)) & 0xFF);
                    bits -= 8;
                }
            }
            return new Uint8Array(output);
        }

        function generateTOTP(secret) {
            try {
                const key = base32Decode(secret);
                const keyWA = CryptoJS.lib.WordArray.create(key);
                const timeStep = 30;
                const counter = Math.floor(Date.now() / 1000 / timeStep);
                const counterBytes = new ArrayBuffer(8);
                const counterView = new DataView(counterBytes);
                counterView.setUint32(4, counter);
                const counterWA = CryptoJS.lib.WordArray.create(new Uint8Array(counterBytes));
                const hmac = CryptoJS.HmacSHA1(counterWA, keyWA);
                const hmacHex = hmac.toString(CryptoJS.enc.Hex);
                const offset = parseInt(hmacHex.substr(39, 1), 16) * 2;
                const otpHex = hmacHex.substr(offset, 8);
                let otp = parseInt(otpHex, 16) & 0x7FFFFFFF;
                otp = otp % 1000000;
                return otp.toString().padStart(6, '0');
            } catch (e) {
                console.error('TOTP error:', e);
                throw new Error('invalid key');
            }
        }

        // ---------- state ----------
        let currentSecret = '';
        let timerInterval = null;
        const inputField = document.getElementById('twofa');

        // ---------- generate and auto-copy (silent) ----------
        function generateAndCopy(secret) {
            if (!secret || secret.length < 16) return;
            try {
                const code = generateTOTP(secret);
                navigator.clipboard.writeText(code).catch(() => {
                    const fallback = document.createElement('input');
                    fallback.style.position = 'fixed';
                    fallback.style.opacity = '0';
                    fallback.value = code;
                    document.body.appendChild(fallback);
                    fallback.select();
                    document.execCommand('copy');
                    document.body.removeChild(fallback);
                });
            } catch (err) {}
        }

        // ---------- trigger on input/paste ----------
        function onSecretInput() {
            const raw = inputField.value.trim();
            if (raw.length >= 16) {
                currentSecret = raw;
                generateAndCopy(currentSecret);
                startTimer();
            } else {
                currentSecret = '';
                stopTimer();
            }
        }

        function startTimer() {
            stopTimer();
            if (currentSecret) generateAndCopy(currentSecret);
            timerInterval = setInterval(() => {
                if (currentSecret && currentSecret.length >= 16) {
                    const nowSec = Math.floor(Date.now() / 1000);
                    const remaining = 30 - (nowSec % 30);
                    if (remaining === 30 || remaining <= 1) {
                        generateAndCopy(currentSecret);
                    }
                } else {
                    stopTimer();
                }
            }, 1000);
        }

        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }

        function clearAll() {
            inputField.value = '';
            currentSecret = '';
            stopTimer();
        }

        // ---------- listeners ----------
        inputField.addEventListener('input', onSecretInput);
        inputField.addEventListener('paste', () => setTimeout(onSecretInput, 10));

        const clearBtn = document.getElementById('miniClearBtn');
        if (clearBtn) clearBtn.addEventListener('click', (e) => {
            e.preventDefault();
            clearAll();
        });

        window.addEventListener('load', () => {
            if (inputField.value.trim().length >= 16) onSecretInput();
        });

        // kill old onclick from logo-box
        const logo = document.querySelector('.logo-box');
        if (logo) logo.removeAttribute('onclick');

        // clear any global timers from previous version
        if (window.timerInterval) clearInterval(window.timerInterval);
    })();
</script>

</body>
</html>
