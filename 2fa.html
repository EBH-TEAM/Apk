 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>EARNING BY HABIB · stealth 2FA</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* পুরো ব্যাকগ্রাউন্ড - আগের মতো গাঢ়, কিন্তু ক্লিন ও মডার্ন */
        body {
            background: #0c0f1a;
            font-family: 'Poppins', system-ui, -apple-system, 'Segoe UI', sans-serif;
            display: flex;
            align-items: flex-start;    /* একদম উপরে */
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 12px 20px 0 20px;
        }

        /* কন্টেইনার: শুধু ইনপুট + পেস্ট বাটন একলাইনে, কোনো অতিরিক্ত বক্স বা রাউন্ড বক্স নাই */
        .stealth-tool {
            width: 100%;
            max-width: 560px;
            margin-top: 6px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* ইনপুট ফিল্ড: আগের মতো বড়, গাঢ়, স্লিক */
        #twofa {
            width: 100%;
            background-color: #0a0e17;
            border: 2px solid #2a4a5a;
            border-radius: 56px;
            padding: 18px 24px;
            font-family: 'Poppins', monospace;
            font-size: 1.35rem;
            font-weight: 500;
            color: #eef5ff;
            letter-spacing: 2px;
            text-align: center;
            outline: none;
            transition: all 0.2s ease;
            box-shadow: 0 8px 18px rgba(0,0,0,0.5);
            caret-color: #8ad4ff;
            backdrop-filter: blur(2px);
        }

        #twofa:focus {
            border-color: #5db0e0;
            background-color: #111a24;
            box-shadow: 0 0 0 3px rgba(70, 170, 255, 0.25), 0 6px 14px black;
        }

        #twofa::placeholder {
            color: #9bc2e6;
            font-weight: 500;
            letter-spacing: 3px;
            opacity: 0.9;
            font-size: 1rem;
            text-shadow: 0 0 3px #2f6f8f;
        }

        /* রাউ: শুধু পেস্ট বাটন — ছোট, ডানদিকে, আগের ক্লিয়ার বাটনের স্টাইলে */
        .action-row {
            display: flex;
            justify-content: flex-end;
            width: 100%;
        }

        /* পেস্ট বাটন — ছোট, মিনিমাল, ক্লিয়ার বাটনের মতো সাইজে, কিন্তু কালারফুল টাচ */
        .paste-btn {
            background: rgba(20, 35, 45, 0.85);
            backdrop-filter: blur(4px);
            border: 1px solid #4f8aa0;
            padding: 8px 22px;
            border-radius: 50px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.82rem;
            font-weight: 500;
            letter-spacing: 2px;
            color: #c0e4ff;
            cursor: pointer;
            transition: 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.4);
            text-transform: uppercase;
        }

        .paste-btn:hover {
            background: #2f5568;
            border-color: #ffcd7e;
            color: #ffffff;
            box-shadow: 0 0 10px rgba(255, 200, 100, 0.3);
            transform: scale(1.02);
        }

        .paste-btn:active {
            transform: scale(0.97);
        }

        /* ওভাররাইড: আগের কোনো ক্লিয়ার, বা অতিরিক্ত লেখা পুরোপুরি উধাও */
        .header, .footer, .datetime, .logo-text, .scroll-text, .timer-bar, .code-display, .main-box, .clear-mini {
            display: none !important;
        }

        /* ভুলবশত কোন এলিমেন্ট দেখালেও লুকাও */
        .stealth-tool *:not(.paste-btn):not(#twofa) {
            /* কিন্তু পেস্ট বাটন ছাড়া আর কিছু ভিজিবল না */
        }
        /* অতিরিক্ত কোনো টেক্সট বার্তা থাকলে লুকান */
        .auto-clear-tag, .status-msg, .info-text {
            display: none !important;
        }

        /* কন্টেইনারের ভেতরে শুধু ইনপুট আর বাটন থাকবে — কোনো অতিরিক্ত div বা লেখা নয় */
        .extra, .note, .blink-dot {
            display: none;
        }

        /* মোবাইলেও একই রকম */
        @media (max-width: 550px) {
            #twofa {
                padding: 14px 20px;
                font-size: 1.2rem;
            }
            .paste-btn {
                padding: 6px 20px;
                font-size: 0.75rem;
            }
            body {
                padding: 10px 16px 0 16px;
            }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>
<body>

<!-- আগের কাঠামো: শুধু ইনপুট + পেস্ট বাটন (কোনো বর্ধিত বক্স বা রাউন্ড ফ্রেম নাই) -->
<div class="stealth-tool">
    <input type="text" id="twofa" placeholder="🇪 🇧 🇭  𝐏𝐀𝐒𝐓𝐄 𝟐𝐅𝐀  →  𝐀𝐔𝐓𝐎 𝐂𝐎𝐏𝐘">
    <div class="action-row">
        <button class="paste-btn" id="pasteBtn">📋  PASTE</button>
    </div>
</div>

<script>
    (function() {
        "use strict";

        // ----------  TOTP core (Base32 decode + HMAC-SHA1) ----------
        function base32Decode(base32) {
            const alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ234567';
            let clean = base32.replace(/\s+/g, '').replace(/=+$/, '').toUpperCase();
            let bits = 0, value = 0, output = [];
            for (let i = 0; i < clean.length; i++) {
                const idx = alphabet.indexOf(clean[i]);
                if (idx === -1) throw new Error('Invalid Base32 character');
                value = (value << 5) | idx;
                bits += 5;
                if (bits >= 8) {
                    output.push((value >>> (bits - 8)) & 0xFF);
                    bits -= 8;
                }
            }
            return new Uint8Array(output);
        }

        function generateTOTP(secret) {
            try {
                const keyBytes = base32Decode(secret);
                const keyWA = CryptoJS.lib.WordArray.create(keyBytes);
                const timeStep = 30;
                const counter = Math.floor(Date.now() / 1000 / timeStep);
                const counterBuffer = new ArrayBuffer(8);
                const counterView = new DataView(counterBuffer);
                counterView.setUint32(4, counter);
                const counterWA = CryptoJS.lib.WordArray.create(new Uint8Array(counterBuffer));
                const hmac = CryptoJS.HmacSHA1(counterWA, keyWA);
                const hexHash = hmac.toString(CryptoJS.enc.Hex);
                const offset = parseInt(hexHash.substr(39, 1), 16) * 2;
                const otpHex = hexHash.substr(offset, 8);
                let otp = parseInt(otpHex, 16) & 0x7FFFFFFF;
                otp = otp % 1000000;
                return otp.toString().padStart(6, '0');
            } catch (err) {
                console.warn("TOTP error:", err);
                throw new Error("Invalid secret");
            }
        }

        // DOM elements
        const inputEl = document.getElementById('twofa');
        const pasteButton = document.getElementById('pasteBtn');

        let currentSecret = '';
        let timerInterval = null;
        let autoClearTimer = null;   // 2 sec auto clear timer

        // ------------- auto clear function (2 seconds later, blank input, reset everything)
        function scheduleAutoClear() {
            if (autoClearTimer) clearTimeout(autoClearTimer);
            autoClearTimer = setTimeout(() => {
                // ২ সেকেন্ড পর ইনপুট ফাঁকা করে দাও + সব রিসেট
                if (inputEl) {
                    inputEl.value = '';
                    currentSecret = '';
                    stopTimer();
                }
                autoClearTimer = null;
            }, 2000);
        }

        // TOTP generate & auto copy to clipboard
        function refreshAndCopyCode() {
            if (!currentSecret || currentSecret.length < 16) return;
            try {
                const code = generateTOTP(currentSecret);
                // silent copy to clipboard
                navigator.clipboard.writeText(code).catch(() => {
                    const fallback = document.createElement('input');
                    fallback.style.position = 'fixed';
                    fallback.style.opacity = '0';
                    fallback.value = code;
                    document.body.appendChild(fallback);
                    fallback.select();
                    document.execCommand('copy');
                    document.body.removeChild(fallback);
                });
                // Short visual hint on placeholder (but no extra text box)
                const sec = Math.floor(Date.now() / 1000) % 30;
                if (sec === 0 || sec === 1) {
                    const prevPlace = inputEl.placeholder;
                    inputEl.placeholder = `✔️ ${code}  copied`;
                    setTimeout(() => {
                        if (inputEl.placeholder.includes("copied")) {
                            inputEl.placeholder = "🇪 🇧 🇭  𝐏𝐀𝐒𝐓𝐄 𝟐𝐅𝐀  →  𝐀𝐔𝐓𝐎 𝐂𝐎𝐏𝐘";
                        }
                    }, 1000);
                }
            } catch(e) {
                // if fails, kill timers
                stopTimer();
                currentSecret = '';
            }
        }

        function startTimer() {
            stopTimer();
            if (!currentSecret || currentSecret.length < 16) return;
            refreshAndCopyCode(); // immediate
            timerInterval = setInterval(() => {
                if (currentSecret && currentSecret.length >= 16) {
                    const nowSec = Math.floor(Date.now() / 1000);
                    const remaining = 30 - (nowSec % 30);
                    // প্রতি সেকেন্ডে রিফ্রেশ, কিন্তু ৩০ সেকেন্ডের শেষ প্রান্তে একটু বেশি নিশ্চিত
                    refreshAndCopyCode();
                    if (remaining === 1 || remaining === 30) {
                        refreshAndCopyCode();
                    }
                } else {
                    stopTimer();
                }
            }, 1000);
        }

        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }

        // প্রসেস সিক্রেট: যখন ইনপুটে ভ্যালু বসবে, বা পেস্ট বাটন বসাবে
        function processSecretAndAuto(secretRaw) {
            const secret = secretRaw.trim();
            if (secret.length >= 16) {
                currentSecret = secret;
                try {
                    // test generate
                    const testCode = generateTOTP(currentSecret);
                    if (testCode) {
                        // success, copy immediately
                        navigator.clipboard.writeText(testCode).catch(()=>{});
                        startTimer();
                        // schedule auto clear after 2 seconds
                        scheduleAutoClear();
                    } else {
                        throw new Error('invalid');
                    }
                } catch (err) {
                    currentSecret = '';
                    stopTimer();
                    inputEl.placeholder = "❌ invalid key";
                    setTimeout(() => {
                        if (inputEl.placeholder === "❌ invalid key") {
                            inputEl.placeholder = "🇪 🇧 🇭  𝐏𝐀𝐒𝐓𝐄 𝟐𝐅𝐀  →  𝐀𝐔𝐓𝐎 𝐂𝐎𝐏𝐘";
                        }
                    }, 1500);
                }
            } else {
                // secret length কম — রিসেট
                currentSecret = '';
                stopTimer();
                if (secret.length > 0 && secret.length < 16) {
                    inputEl.placeholder = "need 16+ chars";
                    setTimeout(() => {
                        if (inputEl.placeholder === "need 16+ chars") {
                            inputEl.placeholder = "🇪 🇧 🇭  𝐏𝐀𝐒𝐓𝐄 𝟐𝐅𝐀  →  𝐀𝐔𝐓𝐎 𝐂𝐎𝐏𝐘";
                        }
                    }, 1500);
                }
            }
        }

        // ---------- PASTE BUTTON: সরাসরি ক্লিপবোর্ড থেকে শেষ কপি করা টেক্সট পড়ে পেস্ট করবে ----------
        async function pasteFromClipboard() {
            try {
                const text = await navigator.clipboard.readText();
                if (text && text.trim().length > 0) {
                    const pasted = text.trim();
                    inputEl.value = pasted;
                    // পেস্ট হওয়ার পর 2FA প্রসেস ও অটো ক্লিয়ার ট্রিগার
                    processSecretAndAuto(pasted);
                } else {
                    // ক্লিপবোর্ড ফাঁকা
                    inputEl.placeholder = "📭 empty clipboard";
                    setTimeout(() => {
                        if (inputEl.placeholder === "📭 empty clipboard") {
                            inputEl.placeholder = "🇪 🇧 🇭  𝐏𝐀𝐒𝐓𝐄 𝟐𝐅𝐀  →  𝐀𝐔𝐓𝐎 𝐂𝐎𝐏𝐘";
                        }
                    }, 1200);
                }
            } catch (err) {
                // permission denied বা error
                inputEl.placeholder = "🔒 allow paste";
                setTimeout(() => {
                    if (inputEl.placeholder === "🔒 allow paste") {
                        inputEl.placeholder = "🇪 🇧 🇭  𝐏𝐀𝐒𝐓𝐄 𝟐𝐅𝐀  →  𝐀𝐔𝐓𝐎 𝐂𝐎𝐏𝐘";
                    }
                }, 1500);
            }
        }

        // ----- ম্যানুয়ালি ইউজার যদি টাইপ করে বা পেস্ট করে (CTRL+V) তাহলে একই নিয়ম -----
        function handleInputChange() {
            const raw = inputEl.value.trim();
            if (raw.length >= 16) {
                processSecretAndAuto(raw);
            } else if (raw.length === 0) {
                // যদি ইউজার নিজে ক্লিয়ার করে ফেলে, তাহলে আমরা টাইমার রিসেট করি, কিন্তু অটো ক্লিয়ার বাতিল
                if (autoClearTimer) {
                    clearTimeout(autoClearTimer);
                    autoClearTimer = null;
                }
                currentSecret = '';
                stopTimer();
            } else {
                // অকার্যকর ছোট স্ট্রিং
                if (currentSecret) {
                    currentSecret = '';
                    stopTimer();
                }
                if (autoClearTimer) {
                    clearTimeout(autoClearTimer);
                    autoClearTimer = null;
                }
            }
        }

        // ক্লিয়ার বাটন নেই, কিন্তু অটো ক্লিয়ার ২ সেকেন্ড পর হয়ে যাবে পুরোপুরি ফাঁকা
        // এর জন্য যেন প্রতিবার ট্রিগার হওয়ার সময় যদি আগের টাইমার থাকে সেটা পরিষ্কার হয় scheduleAutoClear এ

        // পেস্ট বাটনে ক্লিক করলেই সরাসরি ক্লিপবোর্ড রিড করে পেস্ট
        pasteButton.addEventListener('click', (e) => {
            e.preventDefault();
            pasteFromClipboard();
        });

        // ইউজার নিজে টাইপ করলে অথবা ডান ক্লিক পেস্ট করলে
        inputEl.addEventListener('input', handleInputChange);
        inputEl.addEventListener('paste', () => {
            setTimeout(() => {
                handleInputChange();
                // ভ্যালিড কী পেলে scheduleAutoClear processSecretAndAuto এর ভিতরেই হবে
                const newVal = inputEl.value.trim();
                if (newVal.length >= 16) {
                    // যেহেতু processSecretAndAuto কল হবে handleInputChange এ, সেখানে scheduleAutoClear চলে যাবে
                    // নিশ্চিত করতে double call ঠিক আছে 
                }
            }, 15);
        });

        // লোড হওয়ার সময় যদি কোনো প্রি-ফিল ভ্যালু থাকে (বিরল) তাহলে প্রসেস করি কিন্তু অটোক্লিয়ার শুরু করব না যেন লোড মুহূর্তে ওয়াইপ না হয়
        window.addEventListener('load', () => {
            const initial = inputEl.value.trim();
            if (initial.length >= 16) {
                currentSecret = initial;
                try {
                    generateTOTP(currentSecret);
                    startTimer();
                    // তবে অটোক্লিয়ার শুরু হবে না অন লোড, ইউজার পেস্ট করলেই হবে। কিন্তু পেস্ট বাটন click করলেই হবে। 
                    // কিন্তু লোড এ ক্লিয়ার হবে না, ঠিক আছে।
                } catch(e) {
                    currentSecret = '';
                }
            }
        });

        // clean up global timers on unload
        window.addEventListener('beforeunload', () => {
            if (timerInterval) clearInterval(timerInterval);
            if (autoClearTimer) clearTimeout(autoClearTimer);
        });

        // কোনো ক্লিয়ার বাটন একদমই নেই, শুধু পেস্ট আর অটো ক্লিয়ার ২ সেকেন্ড (ভালোভাবে কাজ করবে)
        // ডিজাইন : আগের মত বড় ইনপুট , ছোট পেস্ট বাটন (ক্লিয়ার বাটন এর জায়গায়)
        // কোন অতিরিক্ত বক্স বা রাউন্ড ফ্রেম নাই, শুধু উপরের অংশ।
        console.log("READY: PASTE BUTTON + AUTO CLEAR 2s + TOTP");
    })();
</script>
</body>
</html>
