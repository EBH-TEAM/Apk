<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Habib Earning • হোম</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Font: Poppins + বাংলা সাপোর্ট -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', 'SolaimanLipi', 'Arial', sans-serif;
        }

        body {
            background: radial-gradient(circle at 10% 20%, rgba(255,220,100,0.2) 0%, transparent 40%),
                        radial-gradient(circle at 90% 40%, rgba(100,220,255,0.15) 0%, transparent 45%),
                        linear-gradient(150deg, #0a1824 0%, #132b36 100%);
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 0;
            position: relative;
            overflow: hidden;
        }

        /* ফ্যান্সি এনিমেশন ব্যাকগ্রাউন্ড */
        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 50%, rgba(255,200,50,0.08) 0%, transparent 30%),
                        radial-gradient(circle at 70% 30%, rgba(0,200,200,0.08) 0%, transparent 35%),
                        radial-gradient(circle at 20% 80%, rgba(255,120,120,0.05) 0%, transparent 40%);
            animation: fancyMove 20s infinite alternate ease-in-out;
            top: -50%;
            left: -50%;
            z-index: 0;
        }

        @keyframes fancyMove {
            0% { transform: scale(1) rotate(0deg); opacity: 0.6; }
            100% { transform: scale(1.2) rotate(5deg); opacity: 1; }
        }

        /* মোবাইলের উপরের অর্ধেক অংশ — পুরো width, অর্ধেক height */
        .mobile-top-half {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 50vh;
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.25), 
                        0 0 0 1.5px rgba(255,255,200,0.6) inset;
            border-radius: 0 0 48px 48px;
            padding: 24px 22px 20px;
            display: flex;
            flex-direction: column;
            z-index: 20;
            border-bottom: 4px solid rgba(255,215,0,0.5);
            animation: slideDown 0.6s ease-out;
        }

        @keyframes slideDown {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(0); }
        }

        /* লোগো — EARNING BY HABIB */
        .logo-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 8px;
        }

        .logo-badge {
            background: linear-gradient(145deg, #1d3142, #0f1e2a);
            width: 80px;
            height: 80px;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 14px 0 #0a131c, 
                        0 15px 25px rgba(0,0,0,0.4),
                        0 0 0 3px rgba(255,240,150,0.5);
            transform: rotate(5deg);
            margin-bottom: 12px;
        }

        .logo-badge i {
            font-size: 46px;
            color: #ffde7a;
            filter: drop-shadow(0 6px 0 #b87e2b);
            transform: rotate(-8deg);
        }

        .brand-text {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(145deg, #0e262e, #1b414d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .brand-text span {
            background: linear-gradient(145deg, #ffe180, #ffb347);
            -webkit-text-fill-color: #10242b;
            padding: 2px 16px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 700;
            box-shadow: inset 0 -2px 0 #c29a2b, 0 6px 0 #8f6f2b;
        }

        /* আমাদের সাথে থাকার জন্য আপনাকে ধন্যবাদ — ইউনিক স্টাইল */
        .thanks-message {
            background: linear-gradient(115deg, #fffbeb, #fff6df);
            padding: 14px 18px;
            border-radius: 60px 60px 60px 60px;
            margin: 10px 0 12px;
            border: 2px solid rgba(255,215,0,0.6);
            box-shadow: 0 10px 0 #e6c27a, 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }

        .thanks-line {
            font-size: 18px;
            font-weight: 700;
            color: #1a353d;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .thanks-line i {
            color: #ff6b4a;
            font-size: 24px;
            text-shadow: 0 2px 0 #b3452a;
        }

        .bangla-touch {
            font-size: 16px;
            font-weight: 600;
            color: #624c1c;
            margin-top: 4px;
            background: rgba(255,225,100,0.3);
            padding: 4px 16px;
            border-radius: 40px;
            display: inline-block;
            border: 1px dashed #ffaa33;
        }

        /* আপনি কিসের কাজ করবেন? — সুপার ক্লিয়ার, ব্লার মুক্ত */
        .work-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 8px 0 10px;
        }

        .work-header i {
            background: #0f1f29;
            color: #ffde7a;
            padding: 10px;
            border-radius: 18px;
            font-size: 22px;
            box-shadow: 0 6px 0 #03090c;
        }

        .work-header h3 {
            font-size: 23px;
            font-weight: 900;
            color: white;
            -webkit-text-fill-color: white;
            text-shadow: 2px 2px 0 #000000, 4px 4px 0 rgba(0,0,0,0.3);
            letter-spacing: 1px;
            background: transparent;
            -webkit-background-clip: unset;
            margin-left: 5px;
        }

        /* স্পেস ছোট — বাটনের জন্য জায়গা */
        .spacer {
            flex: 1;
        }

        /* নিচ থেকে বাটনে ক্লিক করে কাজ স্টার্ট করুন — একমাত্র বাটন */
        .start-work-btn {
            width: 100%;
            margin-top: 8px;
            margin-bottom: 5px;
        }

        .btn-special {
            background: linear-gradient(105deg, #1f3343, #0e1e28);
            border: none;
            border-radius: 90px;
            padding: 16px 20px;
            color: white;
            font-size: 18px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            border: 2px solid rgba(255,230,100,0.8);
            box-shadow: 0 16px 0 #0c171f, 0 10px 30px black;
            transition: 0.06s linear;
            cursor: pointer;
            text-shadow: 0 1px 2px black;
        }

        .btn-special i {
            font-size: 26px;
            color: #ffe180;
            filter: drop-shadow(0 2px 0 #a47128);
        }

        .btn-special:active {
            transform: translateY(12px);
            box-shadow: 0 4px 0 #0c171f, 0 10px 25px black;
        }

        /* নিচের অর্ধেক পুরাই ফাঁকা — কিছু নাই */
        .bottom-half-empty {
            height: 50vh;
            width: 100%;
            position: absolute;
            bottom: 0;
            left: 0;
            background: transparent;
            z-index: 1;
            pointer-events: none;
        }

        /* মোবাইল ফিট */
        @media (max-width: 380px) {
            .mobile-top-half { padding: 20px 16px; }
            .brand-text { font-size: 24px; }
            .btn-special { font-size: 16px; padding: 14px 18px; }
            .work-header h3 { font-size: 21px; }
        }
    </style>
</head>
<body>
    <!-- শুধু মোবাইলের উপরের অর্ধেক অংশ (50vh) -->
    <div class="mobile-top-half">
        <!-- লোগো: EARNING BY HABIB -->
        <div class="logo-block">
            <div class="logo-badge">
                <i class="fas fa-coins"></i>
            </div>
            <div class="brand-text">
                EARNING <span>BY</span> HABIB
            </div>
        </div>

        <!-- আমাদের সাথে থাকার জন্য আপনাকে ধন্যবাদ -->
        <div class="thanks-message">
            <div class="thanks-line">
                <i class="fas fa-hands-helping"></i> 
                আমাদের সাথে থাকার জন্য আপনাকে ধন্যবাদ
                <i class="fas fa-smile-beam" style="color: #f39c12;"></i>
            </div>
            <div class="bangla-touch">
                <i class="fas fa-crown"></i> আপনার জার্নি আমাদের গর্ব
            </div>
        </div>

        <!-- আপনি কিসের কাজ করবেন? — সুপার ক্লিয়ার, ব্লার মুক্ত, সাদা লেখা, কালো বর্ডার -->
        <div class="work-header">
            <i class="fas fa-circle-question"></i>
            <h3>
                আপনি কিসের কাজ করবেন?
            </h3>
        </div>

        <!-- স্পেস -->
        <div class="spacer"></div>

        <!-- শুধু একটা বাটন — "নিচ থেকে বাটনে ক্লিক করে কাজ স্টার্ট করুন" -->
        <div class="start-work-btn">
            <button class="btn-special" onclick="alert('✅ কাজ স্টার্ট হয়েছে! শুভ কামনা')">
                <i class="fas fa-arrow-circle-down"></i> 
                নিচ থেকে বাটনে ক্লিক করে কাজ স্টার্ট করুন
                <i class="fas fa-play-circle" style="background: transparent; font-size: 24px;"></i>
            </button>
        </div>
    </div>

    <!-- নিচের অর্ধেক পুরাই ফাঁকা -->
    <div class="bottom-half-empty"></div>

    <script>
        console.log('Habib Earning • মোবাইল টপ হাফ ✅');
        console.log('আপনি কিসের কাজ করবেন? — সুপার ক্লিয়ার, ব্লার নেই');
    </script>
</body>
</html>
